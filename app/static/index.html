<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cymbal Bank | Recruitment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern.css">
</head>
<body>
    <div class="header">
        <div class="logo-container">
            <img src="CymbalLogo.png" alt="Cymbal logo" class="logo">
            <div class="portal-title">CYMBAL BANK | RECRUITMENT</div>
        </div>
        <div class="status-indicator">
            <span id="connection-status">Online</span>
        </div>
    </div>

    <div class="main-container">
        <!-- Tabs Header -->
        <div class="tabs-header">
            <button class="tab-btn active" id="tab-chat" onclick="app.switchTab('chat')">CHAT WITH AGENT</button>
            <button class="tab-btn" id="tab-profile" onclick="app.switchTab('profile')">CANDIDATE PROFILE</button>
        </div>

        <!-- Chat Tab Pane -->
        <div id="chat-pane" class="tab-pane active">
            <!-- Left: Chat View -->
            <div id="chat-left-section">
                <div id="chat-window" class="chat-window">
                    <div class="message bot">
                        Welcome to Cymbal Bank's Recruitment Portal. How can I help you today?
                    </div>
                </div>
                
                <div id="typing-indicator" class="typing-indicator">Agent is thinking...</div>

                <div class="input-area">
                    <div class="upload-container">
                        <label for="file-input" class="upload-icon" title="Upload Document">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        </label>
                        <input type="file" id="file-input">
                    </div>
                    
                    <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                    <button id="send-btn" class="btn-send">Send</button>
                </div>
            </div>

            <!-- Right: Auto-Populated Split View -->
            <div id="split-profile-wrapper">
                <div class="profile-header">
                    <h3 style="margin: 0; color: var(--primary);">Live Candidate Profile</h3>
                </div>
                <div id="split-profile-content" class="profile-container" style="flex: 1; overflow-y: auto; padding: 1.5rem;">
                    <div style="text-align: center; color: #888; margin-top: 3rem;">
                        Waiting for email address in chat to load profile...
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Tab Pane -->
        <div id="profile-pane" class="tab-pane">
            <div class="profile-container">
                <div class="profile-search">
                    <input type="text" id="profile-email-input" placeholder="Enter Candidate Email (e.g. abc@xyz.com)" style="flex:1; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid #ccc;">
                    <button onclick="app.handleFetchProfile()" class="btn-send" style="padding: 0.8rem 1.5rem;">Fetch Profile</button>
                </div>

                <div id="profile-content">
                    <div style="text-align: center; color: #888; margin-top: 3rem;">
                        Enter an email address above to view the candidate profile.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="config.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
