document_requirements:
  - document_type: "Pan card"
    status: "Mandatory"
    description: "Required for identity verification and to support the PAN number provided in personal details."
  - document_type: "Salary slip"
    status: "Mandatory"
    description: "Multiple months (e.g., SEP, OCT, NOV) are required to verify previous/current compensation."
  - document_type: "Resume"
    status: "Mandatory"
    description: "Standard professional profile document for record-keeping."
  - document_type: "Additional documents of salary"
    status: "Optional"
    description: "Supplemental documents (e.g., SRL) used for further salary clarification if needed."
  - document_type: "Educational Certificates"
    status: "Mandatory"
    description: "Implicitly required for the background verification (BGV) consent granted in the 'Additional details' section."
