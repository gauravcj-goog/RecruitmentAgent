<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cymbal Bank Recruitment Agent | AI Hiring Assistant</title>
    <meta name="description" content="AI-powered recruitment assistant for Cymbal Bank. Streamline onboarding, HR queries, and job applications with multimodal AI.">
    <meta name="keywords" content="recruitment, AI, Cymbal Bank, HR, onboarding, job application">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/config.js"></script>
    <script src="/js/app.js" type="module"></script>
  </head>

  <body>
    <header>
      <h1>Recruitment Portal</h1>
      <div class="subtitle">Your AI Recruitment Assistant</div>
      <div class="header-options">
        <label class="header-checkbox" title="Enable model to proactively respond without explicit prompts (Native audio models only)">
          <input type="checkbox" id="enableProactivity" checked>
          <span>Proactivity</span>
        </label>
        <label class="header-checkbox" title="Enable model to detect and adapt to emotional cues (Native audio models only)">
          <input type="checkbox" id="enableAffectiveDialog" checked>
          <span>Affective Dialog</span>
        </label>
      </div>
      <div class="connection-status">
        <div id="qrcode-header" class="header-qr" title="Scan to open on mobile"></div>
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </header>

    <div class="main-layout">
      <div class="container">
        <div id="messages"></div>

        <div class="input-container">
          <form id="messageForm">
            <div class="input-wrapper">
              <input
                type="text"
                id="message"
                name="message"
                placeholder="Type your message here..."
                autocomplete="off"
              />
              <button type="submit" id="sendButton" disabled>Send</button>
              <button type="button" id="startAudioButton">Start Audio</button>
              <input
                type="file"
                id="fileInput"
                style="display: none;"
                accept=".pdf,.doc,.docx,.jpg,.jpeg,.png"
              />
              <button type="button" id="attachFileButton" title="Attach Document">📎</button>
              <button type="button" id="cameraButton">📷 Camera</button>
            </div>
          </form>
        </div>
      </div>

      <div class="console-panel">
        <div class="console-header">
          <h2>Event Console</h2>
          <div class="console-controls">
            <label class="console-checkbox">
              <input type="checkbox" id="showAudioEvents">
              <span>Show audio</span>
            </label>
            <button id="clearConsole" class="console-clear-btn">Clear</button>
          </div>
        </div>
        <div id="consoleContent" class="console-content"></div>
      </div>
    </div>

    <!-- Camera Preview Modal -->
    <div id="cameraModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Camera Preview</h3>
          <button id="closeCameraModal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <video id="cameraPreview" autoplay playsinline></video>
        </div>
        <div class="modal-footer">
          <button id="cancelCamera" class="btn-secondary">Cancel</button>
          <button id="captureImage" class="btn-primary">📷 Send Image</button>
        </div>
      </div>
    </div>
  </body>
</html>
